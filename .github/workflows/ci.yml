name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Type check & Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "=== Bundle sizes ==="
          find dist/assets -type f | sort | xargs ls -lh | awk '{print $5, $9}'
          TOTAL=$(du -sb dist | cut -f1)
          echo "Total dist size: $(du -sh dist | cut -f1)"
          if [ "$TOTAL" -gt 5242880 ]; then
            echo "WARNING: dist exceeds 5 MB"
            exit 1
          fi
